<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Flyers DANAOSTH</title>
<style>
@import url('https://fonts.googleapis.com/css2?family=Bebas+Neue&family=Inter:wght@300;400;500;600;700;800&display=swap');

:root {
  --negro:   #0A0A0A;
  --blanco:  #FFFFFF;
  --gold:    #C9A84C;
  --gold2:   #F0D080;
  --gris:    #8A8A8A;
  --gris-bg: #F5F5F5;
  --borde:   #E0E0E0;
}

*, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

body {
  font-family: 'Inter', sans-serif;
  background: var(--gris-bg);
  min-height: 100vh;
  color: var(--negro);
}

/* HEADER */
header {
  background: var(--negro);
  padding: 0 24px;
  height: 60px;
  display: flex; align-items: center; justify-content: space-between;
  border-bottom: 2px solid var(--gold);
}
.brand { display: flex; align-items: center; gap: 12px; }
.brand-letter {
  width: 36px; height: 36px;
  background: var(--gold);
  color: var(--negro);
  font-family: 'Bebas Neue', sans-serif;
  font-size: 1.3rem; letter-spacing: 1px;
  display: flex; align-items: center; justify-content: center;
  border-radius: 6px;
}
.brand-name { color: var(--blanco); font-size: .95rem; font-weight: 700; letter-spacing: 2px; }
.brand-sub  { color: var(--gold); font-size: .65rem; letter-spacing: 3px; text-transform: uppercase; }
.header-badge {
  color: var(--gold); font-size: .65rem; font-weight: 600;
  border: 1px solid var(--gold); padding: 4px 10px; border-radius: 20px;
  letter-spacing: 1px;
}

/* LAYOUT */
.app {
  display: grid;
  grid-template-columns: 360px 1fr;
  gap: 20px;
  padding: 20px;
  max-width: 1100px;
  margin: 0 auto;
  align-items: start;
}

/* CARDS */
.card {
  background: var(--blanco);
  border-radius: 12px;
  box-shadow: 0 1px 12px rgba(0,0,0,.07);
  overflow: hidden;
  margin-bottom: 16px;
}
.card-header {
  padding: 13px 18px;
  border-bottom: 1px solid var(--borde);
  font-size: .7rem; font-weight: 700;
  text-transform: uppercase; letter-spacing: 1.5px;
  color: var(--gris);
  display: flex; align-items: center; gap: 8px;
}
.card-header span.dot {
  width: 6px; height: 6px; background: var(--gold); border-radius: 50%;
}
.card-body { padding: 18px; display: flex; flex-direction: column; gap: 14px; }

/* UPLOAD */
.upload-zona {
  border: 1.5px dashed var(--borde);
  border-radius: 10px; padding: 28px 16px;
  text-align: center; cursor: pointer;
  transition: all .2s; position: relative;
  background: #FAFAFA;
}
.upload-zona:hover { border-color: var(--gold); background: #fffdf5; }
.upload-zona input { position: absolute; inset: 0; opacity: 0; cursor: pointer; }
.up-icon { font-size: 2rem; margin-bottom: 8px; }
.up-text { font-size: .82rem; font-weight: 700; color: var(--negro); }
.up-sub  { font-size: .72rem; color: var(--gris); margin-top: 3px; }
.preview-img { width: 100%; aspect-ratio: 1; object-fit: cover; border-radius: 8px; display: none; }

/* INPUTS */
label { font-size: .75rem; font-weight: 600; color: var(--negro); margin-bottom: 5px; display: block; letter-spacing: .3px; }
input[type=text], input[type=number], textarea, select {
  width: 100%; padding: 10px 12px;
  border: 1.5px solid var(--borde); border-radius: 8px;
  font-size: .88rem; font-family: 'Inter', sans-serif;
  outline: none; transition: border-color .15s; color: var(--negro);
  background: #fff;
}
input:focus, textarea:focus, select:focus { border-color: var(--gold); }
textarea { resize: vertical; min-height: 72px; line-height: 1.5; }
.row2 { display: grid; grid-template-columns: 1fr 1fr; gap: 10px; }

/* ESTILOS */
.estilos { display: grid; grid-template-columns: 1fr 1fr; gap: 8px; }
.e-btn {
  padding: 10px 8px; border-radius: 8px;
  border: 1.5px solid var(--borde); background: #fff;
  cursor: pointer; text-align: center; transition: all .15s;
  font-family: 'Inter', sans-serif;
}
.e-btn:hover { border-color: var(--gold); }
.e-btn.active { border-color: var(--negro); background: var(--negro); color: #fff; }
.e-btn.active .e-lbl { color: #fff; }
.e-ico { font-size: 1.2rem; display: block; margin-bottom: 3px; }
.e-lbl { font-size: .72rem; font-weight: 700; color: var(--negro); }

/* BTN GENERAR */
.btn-gen {
  width: 100%; padding: 13px;
  background: var(--negro); color: var(--gold);
  border: none; border-radius: 10px;
  font-size: .95rem; font-weight: 700;
  font-family: 'Inter', sans-serif; letter-spacing: 1.5px;
  text-transform: uppercase; cursor: pointer;
  transition: all .15s; display: flex; align-items: center; justify-content: center; gap: 8px;
}
.btn-gen:hover { background: #222; }
.btn-gen:disabled { opacity: .4; cursor: not-allowed; }

/* LOADING */
.loading {
  display: none; align-items: center; gap: 10px;
  padding: 11px 14px; background: #fafafa; border: 1px solid var(--borde);
  border-radius: 8px; font-size: .8rem; font-weight: 600; color: var(--gris);
}
.loading.show { display: flex; }
.spinner {
  width: 16px; height: 16px;
  border: 2px solid var(--borde); border-top-color: var(--gold);
  border-radius: 50%; animation: spin .7s linear infinite; flex-shrink: 0;
}
@keyframes spin { to { transform: rotate(360deg); } }

/* PANEL DERECHO */
.preview-panel { position: sticky; top: 20px; display: flex; flex-direction: column; gap: 16px; }

.canvas-wrap {
  background: var(--blanco); border-radius: 12px;
  box-shadow: 0 1px 12px rgba(0,0,0,.07);
  padding: 18px; display: flex; flex-direction: column; align-items: center; gap: 14px;
}
.cw-title { font-size: .7rem; font-weight: 700; letter-spacing: 1.5px; text-transform: uppercase; color: var(--gris); align-self: flex-start; }

#flyer-canvas { border-radius: 10px; max-width: 100%; max-height: 500px; box-shadow: 0 8px 32px rgba(0,0,0,.18); display: none; }

.placeholder {
  width: 100%; aspect-ratio: 9/16; max-height: 480px;
  border: 1.5px dashed var(--borde); border-radius: 10px;
  display: flex; flex-direction: column; align-items: center; justify-content: center;
  gap: 10px; background: #FAFAFA;
}
.placeholder p { font-size: .82rem; color: var(--gris); font-weight: 500; }

/* EDITAR TEXTO */
.edit-card { background: var(--blanco); border-radius: 12px; box-shadow: 0 1px 12px rgba(0,0,0,.07); overflow: hidden; display: none; }
.edit-card.show { display: block; }
.ec-header {
  padding: 13px 18px; border-bottom: 1px solid var(--borde);
  display: flex; justify-content: space-between; align-items: center;
}
.ec-title { font-size: .7rem; font-weight: 700; letter-spacing: 1.5px; text-transform: uppercase; color: var(--gris); }
.ia-badge { background: var(--negro); color: var(--gold); font-size: .62rem; font-weight: 700; padding: 3px 8px; border-radius: 20px; letter-spacing: .5px; }
.ec-body { padding: 16px; display: flex; flex-direction: column; gap: 12px; }
.btn-regen {
  width: 100%; padding: 9px;
  background: #fafafa; border: 1.5px solid var(--borde);
  border-radius: 8px; font-size: .8rem; font-weight: 700;
  font-family: 'Inter', sans-serif; cursor: pointer; color: var(--negro);
  letter-spacing: .5px; transition: all .15s;
}
.btn-regen:hover { border-color: var(--negro); }

/* DESCARGAR */
.btns-dl { display: grid; grid-template-columns: 1fr 1fr; gap: 10px; width: 100%; }
.btn-dl {
  padding: 12px 8px; border-radius: 10px; border: none;
  font-size: .78rem; font-weight: 700; font-family: 'Inter', sans-serif;
  cursor: pointer; transition: opacity .15s; text-align: center; line-height: 1.4;
}
.btn-dl:hover { opacity: .88; }
.btn-dl.chat  { background: #25D366; color: #fff; }
.btn-dl.story { background: var(--negro); color: var(--gold); }

@media (max-width: 780px) {
  .app { grid-template-columns: 1fr; }
  .preview-panel { position: static; }
}
</style>
</head>
<body>

<header>
  <div class="brand">
    <div class="brand-letter">D</div>
    <div>
      <div class="brand-name">DANAOSTH</div>
      <div class="brand-sub">Sportswear · Generador de Flyers</div>
    </div>
  </div>
  <div class="header-badge">DEMO ✦</div>
</header>

<div class="app">

  <!-- IZQUIERDA -->
  <div>
    <div class="card">
      <div class="card-header"><span class="dot"></span> Foto del producto</div>
      <div class="card-body">
        <div class="upload-zona" id="upload-zona">
          <input type="file" accept="image/jpeg,image/png,image/webp,image/heic" 
            id="foto-input" onchange="cargarFoto(event)">
          <div class="up-icon">📸</div>
          <div class="up-text">Sube la foto de la prenda</div>
          <div class="up-sub">JPG · PNG · WEBP — máx 10MB</div>
        </div>
        <img class="preview-img" id="preview-img" alt="Vista previa">
      </div>
    </div>

    <div class="card">
      <div class="card-header"><span class="dot"></span> Datos del producto</div>
      <div class="card-body">
        <div>
          <label>Nombre de la prenda</label>
          <input type="text" id="nombre" placeholder="Ej: Top deportivo Seamless Negro">
        </div>
        <div class="row2">
          <div>
            <label>Precio (S/)</label>
            <input type="number" id="precio" placeholder="89.90" min="0" step="0.50">
          </div>
          <div>
            <label>Precio anterior</label>
            <input type="number" id="precio-antes" placeholder="120.00" min="0" step="0.50">
          </div>
        </div>
        <div class="row2">
          <div>
            <label>Tallas disponibles</label>
            <input type="text" id="tallas" placeholder="S / M / L / XL">
          </div>
          <div>
            <label>Color(es)</label>
            <input type="text" id="colores" placeholder="Negro, Gris, Rosa">
          </div>
        </div>
      </div>
    </div>

    <div class="card">
      <div class="card-header"><span class="dot"></span> Estilo del flyer</div>
      <div class="card-body">
        <div class="estilos">
          <button class="e-btn active" data-estilo="dark" onclick="selEstilo(this)">
            <span class="e-ico">🖤</span><span class="e-lbl">Dark Premium</span>
          </button>
          <button class="e-btn" data-estilo="gold" onclick="selEstilo(this)">
            <span class="e-ico">✨</span><span class="e-lbl">Gold Elegante</span>
          </button>
          <button class="e-btn" data-estilo="power" onclick="selEstilo(this)">
            <span class="e-ico">⚡</span><span class="e-lbl">Power Sport</span>
          </button>
          <button class="e-btn" data-estilo="minimal" onclick="selEstilo(this)">
            <span class="e-ico">◻️</span><span class="e-lbl">Minimalista</span>
          </button>
        </div>
        <div class="loading" id="loading"><div class="spinner"></div><span id="load-txt">Generando...</span></div>
        <button class="btn-gen" id="btn-gen" onclick="generarFlyer()">✦ GENERAR FLYER CON IA</button>
      </div>
    </div>
  </div>

  <!-- DERECHA -->
  <div class="preview-panel">
    <div class="canvas-wrap">
      <div class="cw-title">Vista previa</div>
      <div class="placeholder" id="placeholder">
        <span style="font-size:2.5rem">🏋️‍♀️</span>
        <p>Tu flyer aparecerá aquí</p>
      </div>
      <canvas id="flyer-canvas" width="1080" height="1920"></canvas>
      <div class="btns-dl" id="btns-dl" style="display:none">
        <button class="btn-dl chat"  onclick="descargar('chat')">💬 WhatsApp<br>Chat (1:1)</button>
        <button class="btn-dl story" onclick="descargar('story')">📱 WhatsApp<br>Story (9:16)</button>
      </div>
    </div>

    <div class="edit-card" id="edit-card">
      <div class="ec-header">
        <span class="ec-title">✏ Editar texto</span>
        <span class="ia-badge">✦ IA</span>
      </div>
      <div class="ec-body">
        <div><label>Titular</label><input type="text" id="ed-titulo" oninput="redibujar()"></div>
        <div><label>Descripción</label><textarea id="ed-desc" rows="3" oninput="redibujar()"></textarea></div>
        <div><label>Llamada a la acción</label><input type="text" id="ed-cta" oninput="redibujar()"></div>
        <div><label>Nombre de la tienda</label><input type="text" id="ed-tienda" value="DANAOSTH" oninput="redibujar()"></div>
        <button class="btn-regen" onclick="pedirTextoIA()">↺ Regenerar texto con IA</button>
      </div>
    </div>
  </div>
</div>

<div id="print-area" style="display:none"></div>

<script>
// ─── ESTADO ───────────────────────────────────────────────────────────────────
let fotoBase64 = null;
let fotoImg    = null;
let estilo     = 'dark';
let textoIA    = { titulo:'', desc:'', cta:'' };

const TEMAS = {
  dark: {
    bgTop: '#0A0A0A', bgBot: '#1A1A1A',
    accent: '#C9A84C', accentAlt: '#F0D080',
    texto: '#FFFFFF', subtexto: 'rgba(255,255,255,.6)',
    fotoBg: '#111',
    ctaBg: '#C9A84C', ctaTxt: '#0A0A0A',
    nombre: 'Dark Premium',
    linea: '#C9A84C',
  },
  gold: {
    bgTop: '#1C1200', bgBot: '#3D2B00',
    accent: '#F0D080', accentAlt: '#C9A84C',
    texto: '#FFFFFF', subtexto: 'rgba(255,255,255,.65)',
    fotoBg: '#2a1f00',
    ctaBg: '#F0D080', ctaTxt: '#1C1200',
    nombre: 'Gold Elegante',
    linea: '#F0D080',
  },
  power: {
    bgTop: '#0D0D0D', bgBot: '#1a0033',
    accent: '#A855F7', accentAlt: '#E879F9',
    texto: '#FFFFFF', subtexto: 'rgba(255,255,255,.6)',
    fotoBg: '#150025',
    ctaBg: '#A855F7', ctaTxt: '#FFFFFF',
    nombre: 'Power Sport',
    linea: '#A855F7',
  },
  minimal: {
    bgTop: '#FFFFFF', bgBot: '#F0F0F0',
    accent: '#0A0A0A', accentAlt: '#444',
    texto: '#0A0A0A', subtexto: '#555',
    fotoBg: '#FAFAFA',
    ctaBg: '#0A0A0A', ctaTxt: '#FFFFFF',
    nombre: 'Minimalista',
    linea: '#0A0A0A',
  },
};

// ─── FOTO ─────────────────────────────────────────────────────────────────────
function cargarFoto(e) {
  const file = e.target.files[0];
  if (!file) return;
  const reader = new FileReader();
  reader.onload = ev => {
    fotoBase64 = ev.target.result;
    const img = document.getElementById('preview-img');
    img.src = fotoBase64; img.style.display = 'block';
    document.querySelector('.up-icon').style.display = 'none';
    document.querySelector('.up-text').style.display = 'none';
    document.querySelector('.up-sub').style.display  = 'none';
    fotoImg = new Image();
    fotoImg.src = fotoBase64;
  };
  reader.readAsDataURL(file);
}

// ─── ESTILO ───────────────────────────────────────────────────────────────────
function selEstilo(btn) {
  document.querySelectorAll('.e-btn').forEach(b => b.classList.remove('active'));
  btn.classList.add('active');
  estilo = btn.dataset.estilo;
  if (textoIA.titulo) redibujar();
}

// ─── GENERAR ──────────────────────────────────────────────────────────────────
async function generarFlyer() {
  const nombre = document.getElementById('nombre').value.trim();
  const precio = document.getElementById('precio').value.trim();
  if (!nombre || !precio) { alert('Ingresa nombre y precio 💪'); return; }
  if (!fotoBase64) { alert('Sube una foto de la prenda 📸'); return; }
  setLoad(true, 'La IA está creando el texto...');
  await pedirTextoIA();
  setLoad(false);
}

async function pedirTextoIA() {
  const nombre = document.getElementById('nombre').value.trim();
  const precio = document.getElementById('precio').value.trim();
  const tallas = document.getElementById('tallas').value.trim();
  const colores = document.getElementById('colores').value.trim();
  const tema = TEMAS[estilo].nombre;

  const prompt = `Eres experta en marketing de moda deportiva femenina en Perú.
Crea texto para un flyer de WhatsApp de ropa de gimnasio.

Prenda: ${nombre}
Precio: S/ ${precio}
${tallas ? `Tallas: ${tallas}` : ''}
${colores ? `Colores: ${colores}` : ''}
Estilo del flyer: ${tema}
Tienda: DANAOSTH (ropa deportiva)

Responde SOLO con JSON válido, sin backticks ni texto extra:
{
  "titulo": "frase impactante en MAYÚSCULAS (máx 4 palabras, estilo deportivo/motivacional)",
  "desc": "descripción atractiva 1-2 líneas, menciona la prenda, feminina y motivadora, con 1-2 emojis",
  "cta": "llamada a la acción corta (máx 5 palabras)"
}`;

  try {
    setLoad(true, 'Generando texto con IA...');
    const res = await fetch('https://api.anthropic.com/v1/messages', {
      method: 'POST',
      headers: {
        'Content-Type': 'application/json',
        'anthropic-dangerous-direct-browser-access': 'true',
      },
      body: JSON.stringify({
        model: 'claude-sonnet-4-6',
        max_tokens: 300,
        messages: [{
          role: 'user',
          content: [
            { type: 'image', source: { type: 'base64', media_type: fotoBase64.split(';')[0].split(':')[1], data: fotoBase64.split(',')[1] } },
            { type: 'text', text: prompt }
          ]
        }]
      })
    });
    const data = await res.json();
    const raw = data.content.map(c => c.text||'').join('').trim().replace(/```json|```/g,'').trim();
    textoIA = JSON.parse(raw);
  } catch(err) {
    const nombre = document.getElementById('nombre').value.trim();
    textoIA = {
      titulo: 'ENTRENA CON ESTILO',
      desc: `${nombre} — comodidad y estilo para cada entrenamiento 💪`,
      cta: '¡Escríbenos y pídelo!'
    };
  }

  document.getElementById('ed-titulo').value  = textoIA.titulo;
  document.getElementById('ed-desc').value    = textoIA.desc;
  document.getElementById('ed-cta').value     = textoIA.cta;
  document.getElementById('edit-card').classList.add('show');
  setLoad(false);
  dibujarFlyer();
}

// ─── DIBUJAR ──────────────────────────────────────────────────────────────────
function redibujar() {
  textoIA.titulo = document.getElementById('ed-titulo').value;
  textoIA.desc   = document.getElementById('ed-desc').value;
  textoIA.cta    = document.getElementById('ed-cta').value;
  dibujarFlyer();
}

function dibujarFlyer() {
  const canvas = document.getElementById('flyer-canvas');
  const ctx = canvas.getContext('2d');
  const W = 1080, H = 1920;
  canvas.width = W; canvas.height = H;

  const t = TEMAS[estilo];
  const precio = document.getElementById('precio').value;
  const precioAntes = document.getElementById('precio-antes').value;
  const tallas = document.getElementById('tallas').value.trim();
  const tienda = document.getElementById('ed-tienda').value || 'DANAOSTH';
  const titulo = textoIA.titulo || 'DANAOSTH';
  const desc   = textoIA.desc   || '';
  const cta    = textoIA.cta    || 'PÍDELO AHORA';

  // FONDO
  const grad = ctx.createLinearGradient(0, 0, 0, H);
  grad.addColorStop(0, t.bgTop);
  grad.addColorStop(1, t.bgBot);
  ctx.fillStyle = grad;
  ctx.fillRect(0, 0, W, H);

  // Líneas diagonales decorativas de fondo
  ctx.save();
  ctx.globalAlpha = .04;
  ctx.strokeStyle = t.accent;
  ctx.lineWidth = 60;
  for (let i = -H; i < W + H; i += 200) {
    ctx.beginPath(); ctx.moveTo(i, 0); ctx.lineTo(i + H, H); ctx.stroke();
  }
  ctx.restore();

  // FRANJA ACCENT top
  ctx.fillStyle = t.accent;
  ctx.fillRect(0, 0, W, 8);

  // NOMBRE TIENDA TOP
  ctx.fillStyle = t.accent;
  ctx.font = '700 48px Bebas Neue, sans-serif';
  ctx.textAlign = 'left';
  ctx.letterSpacing = '6px';
  ctx.fillText(tienda, 60, 80);

  // Línea decorativa
  ctx.fillStyle = t.linea;
  ctx.fillRect(60, 95, 120, 3);

  ctx.fillStyle = t.subtexto;
  ctx.font = '500 28px Inter, sans-serif';
  ctx.fillText('SPORTSWEAR & FITNESS', 60, 135);

  // FOTO — zona principal
  const fotoX = 0, fotoY = 160, fotoW = W, fotoH = 900;
  if (fotoImg && fotoImg.complete && fotoImg.naturalWidth > 0) {
    ctx.save();
    ctx.beginPath();
    ctx.rect(fotoX, fotoY, fotoW, fotoH);
    ctx.clip();
    const ar = fotoImg.naturalWidth / fotoImg.naturalHeight;
    let dw = fotoW, dh = fotoH;
    if (ar > fotoW / fotoH) { dh = fotoH; dw = dh * ar; }
    else { dw = fotoW; dh = dw / ar; }
    ctx.drawImage(fotoImg, fotoX + (fotoW - dw) / 2, fotoY + (fotoH - dh) / 2, dw, dh);
    ctx.restore();

    // Gradiente sobre la foto (abajo)
    const fadeGrad = ctx.createLinearGradient(0, fotoY + fotoH * .5, 0, fotoY + fotoH);
    fadeGrad.addColorStop(0, 'rgba(0,0,0,0)');
    fadeGrad.addColorStop(1, t.bgTop + 'EE');
    ctx.fillStyle = fadeGrad;
    ctx.fillRect(fotoX, fotoY, fotoW, fotoH);
  }

  // PRECIO BADGE
  const badgeW = 340, badgeH = 120;
  const badgeX = W - badgeW - 50, badgeY = fotoY + fotoH - badgeH - 30;
  ctx.save();
  ctx.shadowColor = 'rgba(0,0,0,.4)';
  ctx.shadowBlur = 20;
  ctx.fillStyle = t.accent;
  roundRect(ctx, badgeX, badgeY, badgeW, badgeH, 16);
  ctx.fill();
  ctx.restore();

  ctx.fillStyle = t.ctaTxt;
  ctx.textAlign = 'center';
  const cx = badgeX + badgeW / 2;

  if (precioAntes) {
    ctx.font = '500 30px Inter, sans-serif';
    ctx.fillStyle = 'rgba(0,0,0,.5)';
    ctx.fillText(`Antes S/ ${parseFloat(precioAntes).toFixed(2)}`, cx, badgeY + 38);
    // tachado
    const tw = ctx.measureText(`Antes S/ ${parseFloat(precioAntes).toFixed(2)}`).width;
    ctx.strokeStyle = 'rgba(0,0,0,.5)';
    ctx.lineWidth = 2;
    ctx.beginPath(); ctx.moveTo(cx - tw/2, badgeY + 33); ctx.lineTo(cx + tw/2, badgeY + 33); ctx.stroke();
    ctx.fillStyle = t.ctaTxt;
    ctx.font = '800 58px Inter, sans-serif';
    ctx.fillText(`S/ ${parseFloat(precio).toFixed(2)}`, cx, badgeY + 95);
  } else {
    ctx.fillStyle = t.ctaTxt;
    ctx.font = '300 30px Inter, sans-serif';
    ctx.fillText('PRECIO', cx, badgeY + 40);
    ctx.font = '800 64px Inter, sans-serif';
    ctx.fillText(`S/ ${parseFloat(precio).toFixed(2)}`, cx, badgeY + 100);
  }

  // TITULO
  const tituloY = fotoY + fotoH + 60;
  ctx.fillStyle = t.texto;
  ctx.font = '700 110px Bebas Neue, sans-serif';
  ctx.textAlign = 'left';
  wrapText(ctx, titulo, 60, tituloY, W - 120, 120);

  // Línea accent
  ctx.fillStyle = t.accent;
  ctx.fillRect(60, tituloY + 30, 80, 4);

  // DESC
  ctx.fillStyle = t.subtexto;
  ctx.font = '400 42px Inter, sans-serif';
  ctx.textAlign = 'left';
  wrapText(ctx, desc, 60, tituloY + 130, W - 120, 54);

  // TALLAS
  if (tallas) {
    const tallasArr = tallas.split('/').map(s => s.trim()).filter(Boolean);
    let tx = 60;
    const ty = tituloY + 260;
    ctx.font = '600 32px Inter, sans-serif';
    tallasArr.forEach(talla => {
      const tw2 = ctx.measureText(talla).width + 32;
      ctx.fillStyle = 'rgba(255,255,255,.08)';
      roundRect(ctx, tx, ty - 36, tw2, 50, 8);
      ctx.fill();
      ctx.strokeStyle = t.accent;
      ctx.lineWidth = 1.5;
      roundRect(ctx, tx, ty - 36, tw2, 50, 8);
      ctx.stroke();
      ctx.fillStyle = t.texto;
      ctx.textAlign = 'center';
      ctx.fillText(talla, tx + tw2/2, ty + 4);
      tx += tw2 + 10;
    });
  }

  // CTA BOTÓN
  const ctaY = H - 200;
  ctx.save();
  ctx.shadowColor = t.accent + '55';
  ctx.shadowBlur = 24;
  ctx.fillStyle = t.ctaBg;
  roundRect(ctx, 60, ctaY, W - 120, 100, 12);
  ctx.fill();
  ctx.restore();

  ctx.fillStyle = t.ctaTxt;
  ctx.font = '700 46px Inter, sans-serif';
  ctx.textAlign = 'center';
  ctx.letterSpacing = '2px';
  ctx.fillText(cta.toUpperCase(), W/2, ctaY + 64);

  // FOOTER
  ctx.fillStyle = t.subtexto;
  ctx.font = '400 30px Inter, sans-serif';
  ctx.fillText('📲 Contáctanos por WhatsApp', W/2, H - 70);

  // Franja accent bottom
  ctx.fillStyle = t.accent;
  ctx.fillRect(0, H - 8, W, 8);

  // Mostrar
  document.getElementById('placeholder').style.display = 'none';
  canvas.style.display = 'block';
  document.getElementById('btns-dl').style.display = 'grid';
}

// ─── HELPERS ──────────────────────────────────────────────────────────────────
function roundRect(ctx, x, y, w, h, r) {
  ctx.beginPath();
  ctx.moveTo(x+r, y);
  ctx.lineTo(x+w-r, y); ctx.quadraticCurveTo(x+w, y, x+w, y+r);
  ctx.lineTo(x+w, y+h-r); ctx.quadraticCurveTo(x+w, y+h, x+w-r, y+h);
  ctx.lineTo(x+r, y+h); ctx.quadraticCurveTo(x, y+h, x, y+h-r);
  ctx.lineTo(x, y+r); ctx.quadraticCurveTo(x, y, x+r, y);
  ctx.closePath();
}

function wrapText(ctx, text, x, y, maxW, lineH) {
  if (!text) return;
  const words = text.split(' ');
  let line = '', cy = y;
  for (let i = 0; i < words.length; i++) {
    const test = line + words[i] + ' ';
    if (ctx.measureText(test).width > maxW && i > 0) {
      ctx.fillText(line.trim(), x, cy);
      line = words[i] + ' '; cy += lineH;
    } else line = test;
  }
  ctx.fillText(line.trim(), x, cy);
}

function setLoad(show, txt) {
  const el = document.getElementById('loading');
  const btn = document.getElementById('btn-gen');
  if (show) { el.classList.add('show'); document.getElementById('load-txt').textContent = txt; btn.disabled = true; }
  else { el.classList.remove('show'); btn.disabled = false; }
}

// ─── DESCARGAR ────────────────────────────────────────────────────────────────
function descargar(tipo) {
  const canvas = document.getElementById('flyer-canvas');
  const slug = (document.getElementById('nombre').value||'prenda').replace(/\s+/g,'_');
  if (tipo === 'story') {
    const a = document.createElement('a');
    a.download = `danaosth_story_${slug}.png`;
    a.href = canvas.toDataURL('image/png'); a.click();
  } else {
    const tmp = document.createElement('canvas');
    tmp.width = 1080; tmp.height = 1080;
    tmp.getContext('2d').drawImage(canvas, 0, -380);
    const a = document.createElement('a');
    a.download = `danaosth_chat_${slug}.png`;
    a.href = tmp.toDataURL('image/png'); a.click();
  }
}
